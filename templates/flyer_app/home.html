{% extends "flyer_app/base.html" %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center;">

    <!-- Welcome Header -->
    <h1 style="font-size: 3em; margin-bottom: 10px;">
        WELCOME TO FLYER APP!
    </h1>

    <!-- Divider Line -->
    <hr style="width: 60%; margin-bottom: 20px;">

    <!-- Description Text (slightly shifted left) -->
    <p style="font-size: 1.2em; max-width: 600px; text-align: left; margin-left: -40px;">
        This website is dedicated to the easy and quick creation of flyers!
    </p>

    <!-- Buttons Container -->
    <div style="display: flex; gap: 40px; margin-top: 30px;">

        <!-- Login Button -->
        <a href="{% url 'login' %}">
            <button style="padding: 10px 20px; font-size: 1em; cursor: pointer;">
                Log In
            </button>
        </a>

        <!-- Sign Up Button -->
         <a href="{% url 'signup' %}">
            <button style="padding: 10px 20px; font-size: 1em; cursor: pointer;">
                Sign Up
            </button>
        </a>

    </div>

</div>
{% endblock %}
