<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flyer App{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: white;
            color: black;
        }

        header {
            background: black;
            color: white;
            padding: 1rem;
        }

        .nav {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav a,
        .nav button {
            color: white;
            text-decoration: none;
            background: grey;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }

        .nav a:hover,
        .nav button:hover {
            background: darkgrey;
        }

        .brand {
            font-weight: bold;
            font-size: 1rem;
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
        }

        .message {
            background: skyblue;
            padding: 1rem 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav">
            <div class="brand">
                <a href="{% url 'home' %}">Flyer App</a>
            </div>

            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <a href="{% url 'home' %}">Home</a>

                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}" style="margin: 0;">
                        {% csrf_token %}
                        <button type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </header>

    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
