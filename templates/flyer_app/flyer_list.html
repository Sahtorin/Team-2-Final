{% extends "flyer_app/base.html" %}

{% block title %}Flyers{% endblock %}

{% block content %}
<h1>Flyer List</h1>
{% if flyers %}
     <ul>
        {% for flyer in flyers %}
              <li>
                <a href=""{% url 'flyer_detail' flyer.pk %}">
                  {{flyer.flyer_name}}
                </a>
              </li>
        {% endfor %}      
     </ul>
{% else %}
   <p>NO flyers found.</p>
{% endif %}     
{% endblock %}
